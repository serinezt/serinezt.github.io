<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulaire de Prise de Contact</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f5f5f5;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: auto;
            background-color: #fff;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.1);
        }
        h1 {
            color: #007BFF;
            text-align: center;
        }
        .form-group {
            margin-bottom: 15px;
            margin-right: 15px;
        }
        .form-group label {
            display: block;
            margin-bottom: 5px;
            color: #333;
        }
        .form-group input[type="text"],
        .form-group input[type="date"],
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
        .form-group textarea {
            height: 100px;
            resize: vertical;
        }
        .form-group select {
            background-color: #f9f9f9;
        }
        .form-group .form-check {
            display: flex;
            align-items: center;
        }
        .form-group .form-check input {
            margin-right: 10px;
        }
        .form-group .form-check label {
            margin: 0;
        }
        .form-group .form-check input[type="radio"] {
            margin: 0 5px 0 0;
        }
        .form-group .form-check input[type="checkbox"] {
            margin: 0 5px 0 0;
        }
        .form-group button {
            background-color: #007BFF;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        .form-group button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Formulaire de Prise de Contact</h1>
        <form>
            <div class="form-group">
                <label for="demandeur">Demandeur</label>
                <input type="text" id="demandeur" name="demandeur">
            </div>

            <div class="form-group">
                <label for="objet">Objet de la demande</label>
                <select id="objet" name="objet">
                    <option value="demande_rapport_expertise">Demande rapport d'expertise</option>
                    <option value="demande_suivi_dossier">Demande suivi du dossier</option>
                    <option value="contestation_nh">Contestation NH</option>
                    <option value="autres">Autres</option>
                    <option value="ren">REN</option>
                    <option value="demande_complement_rapport">Demande complément de rapport</option>
                </select>
            </div>

            <div class="form-group">
                <label for="date_passage">Date de passage SC2, SC3…</label>
                <input                 type="date" id="date_passage" name="date_passage">
            </div>

            <div class="form-group">
                <label for="niveau_sc">Niveau SC</label>
                <select id="niveau_sc" name="niveau_sc">
                    <option value="sc1">SC1</option>
                    <option value="sc2">SC2</option>
                    <option value="sc3">SC3</option>
                </select>
            </div>

            <div class="form-group">
                <label for="personne_contactee">Personne contactée (UE)</label>
                <input type="text" id="personne_contactee" name="personne_contactee">
            </div>

            <div class="form-group">
                <label for="date_contact">Date de contact</label>
                <input type="date" id="date_contact" name="date_contact">
            </div>

            <div class="form-group">
                <label for="mode_contact">Mode de contact (mail, téléphone…)</label>
                <input type="text" id="mode_contact" name="mode_contact">
            </div>

            <div class="form-group">
                <label for="date_engagement">Date engagement</label>
                <input type="date" id="date_engagement" name="date_engagement">
            </div>

            <div class="form-group">
                <label for="priorites">Priorités</label>
                <select id="priorites" name="priorites">
                    <option value="prioritaire">Prioritaire</option>
                    <option value="ultra_prioritaire">Ultra prioritaire</option>
                </select>
            </div>

            <div class="form-group">
                <label for="commentaire">Commentaire</label>
                <textarea id="commentaire" name="commentaire"></textarea>
            </div>

            <div class="form-group">
                <button type="submit">Envoyer</button>
            </div>
        </form>
    </div>
</body>
</html>
